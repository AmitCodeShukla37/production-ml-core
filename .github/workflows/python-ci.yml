name: Production Core CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Codebase
      uses: actions/checkout@v4

    - name: Configure Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Python Automated Tests
      run: |
        if ls algorithms_from_scratch/test_*.py 1>/dev/null 2>&1; then
          pytest
        else
          echo "No Python tests found yet. Skipping."
        fi

    - name: Universal C++ Compilation Validation
      run: |
        echo "Scanning and compiling all C++ files dynamically..."
        cd core_dsa_patterns
        
        # Loop through every single .cpp file in the folder automatically
        for file in *.cpp; do
          if [ -f "$file" ]; then
            echo "Compiling $file..."
            g++ -std=c++17 "$file" -o temp_binary
            rm temp_binary
            echo "✓ $file compiled successfully!"
          fi
        done
